<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background: Charcoal rounded square -->
  <rect width="64" height="64" rx="12" fill="#1A1A1A"/>
  
  <!-- Accent border: Orange frame -->
  <rect x="2" y="2" width="60" height="60" rx="10" fill="none" stroke="#E88A1A" stroke-width="2"/>
  
  <!-- Geometric academic element: Stylized institution symbol -->
  <g transform="translate(32, 32)">
    <!-- Central vertical line (knowledge pillar) -->
    <line x1="0" y1="-14" x2="0" y2="14" stroke="#E88A1A" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- Left wing: Curved bracket -->
    <path d="M -8 -10 Q -12 -10 -12 0 Q -12 10 -8 10" stroke="#E88A1A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    
    <!-- Right wing: Curved bracket -->
    <path d="M 8 -10 Q 12 -10 12 10 Q 12 10 8 10" stroke="#E88A1A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    
    <!-- Top accent: Small shield peak -->
    <polygon points="0,-16 -3,-12 3,-12" fill="#E88A1A"/>
  </g>
</svg>
